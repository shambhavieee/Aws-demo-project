version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/app/data/examduty.db
      - GIN_MODE=release
      - JWT_SECRET=examduty-super-secret-key-change-in-production
      - FRONTEND_URL=http://localhost
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
